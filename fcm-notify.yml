name: BC Electric — FCM Notifications

on:
  schedule:
    - cron: '* * * * *'  # كل دقيقة
  workflow_dispatch:       # تشغيل يدوي للاختبار

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send FCM Notifications
        env:
          FIREBASE_PROJECT_ID: faddi-410e9
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node << 'EOF'
          const https = require('https');
          const crypto = require('crypto');

          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const projectId = process.env.FIREBASE_PROJECT_ID;

          // ─── توليد JWT للمصادقة مع Firebase ───
          function base64url(str) {
            return Buffer.from(str).toString('base64')
              .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
          }

          function makeJWT() {
            const now = Math.floor(Date.now() / 1000);
            const header = base64url(JSON.stringify({ alg: 'RS256', typ: 'JWT' }));
            const payload = base64url(JSON.stringify({
              iss: serviceAccount.client_email,
              sub: serviceAccount.client_email,
              aud: 'https://oauth2.googleapis.com/token',
              iat: now,
              exp: now + 3600,
              scope: 'https://www.googleapis.com/auth/firebase.messaging https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/firebase.database'
            }));
            const sign = crypto.createSign('RSA-SHA256');
            sign.update(`${header}.${payload}`);
            const sig = sign.sign(serviceAccount.private_key, 'base64')
              .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
            return `${header}.${payload}.${sig}`;
          }

          // ─── الحصول على Access Token ───
          function getAccessToken() {
            return new Promise((resolve, reject) => {
              const jwt = makeJWT();
              const body = `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`;
              const req = https.request({
                hostname: 'oauth2.googleapis.com',
                path: '/token',
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
              }, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  const json = JSON.parse(data);
                  if (json.access_token) resolve(json.access_token);
                  else reject(new Error('No access token: ' + data));
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          // ─── قراءة بيانات من Firebase Realtime Database ───
          function dbGet(path, token) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: `${projectId}-default-rtdb.firebaseio.com`,
                path: `/${path}.json?access_token=${token}`,
                method: 'GET'
              }, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { resolve(null); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          // ─── كتابة بيانات في Firebase ───
          function dbSet(path, value, token) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(value);
              const req = https.request({
                hostname: `${projectId}-default-rtdb.firebaseio.com`,
                path: `/${path}.json?access_token=${token}`,
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
              }, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          // ─── إرسال FCM لجهاز واحد ───
          function sendFCM(token, title, body, tag, accessToken) {
            return new Promise((resolve, reject) => {
              const message = JSON.stringify({
                message: {
                  token,
                  notification: { title, body },
                  data: { tag: tag || 'bc-notif' },
                  android: { priority: 'high', notification: { sound: 'default', channel_id: 'bc_electric' } },
                  apns: { payload: { aps: { sound: 'default', badge: 1 } } },
                  webpush: {
                    headers: { Urgency: 'high' },
                    notification: { icon: '/bse/icon-192.png', badge: '/bse/icon-72.png', dir: 'rtl', vibrate: [200,100,200] }
                  }
                }
              });
              const req = https.request({
                hostname: 'fcm.googleapis.com',
                path: `/v1/projects/${projectId}/messages:send`,
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${accessToken}`,
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(message)
                }
              }, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => {
                  console.log(`FCM sent to ${token.slice(0,20)}...: ${res.statusCode}`);
                  resolve(JSON.parse(data));
                });
              });
              req.on('error', reject);
              req.write(message);
              req.end();
            });
          }

          // ─── الدالة الرئيسية ───
          async function main() {
            try {
              console.log('BC Electric FCM Worker started...');
              const accessToken = await getAccessToken();
              console.log('Access token obtained ✅');

              // اقرأ الإشعارات الجديدة غير المرسلة
              const notifications = await dbGet('notifications', accessToken);
              if (!notifications) { console.log('No notifications'); return; }

              // اقرأ توكنات الأجهزة
              const fcmTokens = await dbGet('fcm_tokens', accessToken);
              if (!fcmTokens) { console.log('No FCM tokens'); return; }

              const now = Date.now();
              const oneMinuteAgo = now - 70000; // آخر 70 ثانية

              let sentCount = 0;

              for (const [notifId, notif] of Object.entries(notifications)) {
                // تجاهل الإشعارات المرسلة أو القديمة
                if (notif.fcm_sent) continue;
                
                // تحقق من وقت الإشعار
                const notifTime = new Date(`${notif.date || ''}T${notif.time || '00:00'}:00`).getTime();
                if (isNaN(notifTime) || notifTime < oneMinuteAgo) {
                  // علّم القديمة كمرسلة لتجنب تراكمها
                  if (!isNaN(notifTime) && notifTime < now - 5*60*1000) {
                    await dbSet(`notifications/${notifId}/fcm_sent`, true, accessToken);
                  }
                  continue;
                }

                // حدد المستلمين
                const titles = {
                  attendance_recorded: '✅ تم تسجيل الحضور',
                  attendance_edited:   '✏️ تعديل سجل الحضور',
                  attendance_deleted:  '🗑️ حذف سجل الحضور',
                  payment_recorded:    '💰 دفعة جديدة',
                  bonus_granted:       '🎁 مكافأة جديدة',
                  new_message:         '💬 رسالة جديدة',
                  new_request:         '📋 طلب جديد',
                  request_response:    '📩 رد على طلبك',
                  special_work_added:  '⭐ عمل خاص',
                  share_settled:       '🤝 توزيع الحصص',
                  negative_points_warning: '⚠️ تحذير نقاط',
                };
                const title = titles[notif.type] || 'BC Electric';
                const body = notif.message || '';

                // إرسال للمستلم المحدد
                const recipients = [];
                if (notif.forAdmin) {
                  // أرسل لكل المشرفين
                  for (const [uid, data] of Object.entries(fcmTokens)) {
                    if (data.role === 'admin' && data.token) recipients.push(data.token);
                  }
                }
                if (notif.forEmployee && notif.employeeId) {
                  const empToken = fcmTokens[notif.employeeId];
                  if (empToken && empToken.token) recipients.push(empToken.token);
                }

                for (const token of recipients) {
                  try {
                    await sendFCM(token, title, body, notif.type, accessToken);
                    sentCount++;
                  } catch(e) {
                    console.warn('FCM send error:', e.message);
                  }
                }

                // علّم الإشعار كمرسل
                await dbSet(`notifications/${notifId}/fcm_sent`, true, accessToken);
              }

              console.log(`✅ Done. Sent ${sentCount} notifications.`);
            } catch(e) {
              console.error('Error:', e.message);
              process.exit(1);
            }
          }

          main();
          EOF
